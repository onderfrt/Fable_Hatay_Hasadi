name: Testler

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bağımlılıkları kur
        working-directory: tests
        run: npm install

      - name: Chromium kur
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Tip kontrolü (jsconfig + JSDoc)
        working-directory: tests
        run: npm run typecheck

      - name: Uçtan uca testler
        working-directory: tests
        run: npm test
